<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Первый Сайт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f0f0f0;
            color: #333;
            text-align: center;
        }
        h1 { color: #0066cc; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: 40px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Привет! 👋</h1>
        <p>Это мой первый сайт. Он состоит всего из одного файла.</p>
        <p>Можно добавлять текст, картинки, ссылки, видео и т.д.</p>
        
        <button onclick="alert('Кнопка работает! 🔥')">Нажми меня</button>
    </div>
</body>
</html>
